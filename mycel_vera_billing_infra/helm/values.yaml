# mycel_vera_billing/mycel_vera_billing_infra/helm/values.yaml — SHIPS with release
image:
  registry: ""
  pullPolicy: IfNotPresent

artifacts:
  service:
    image: mycel_vera_billing_service
    tag: latest
    targetPort: 3000
    subdomain: api
    probe: /health
    clusterEnv: true
    labels:
      egress-tier: external
    env:
      ACCEPT_LICENSE: "yes"
      SERVICE_NAME: "Mycel Vera Billing"

  web:
    image: mycel_vera_billing_web
    tag: latest
    targetPort: 3002
    subdomain: ""
    probe: /
    serviceUrl: true
    env:
      ACCEPT_LICENSE: "yes"
      MYCEL_IAM_API_URL: "http://api.mycel-iam.mycel.test"
      MYCEL_ENTERPRISE_API_URL: "http://api.mycel-enterprise.mycel.test"
      MYCEL_VERA_BILLING_API_URL: "http://api.mycel-vera-billing.mycel.test"

  mcp:
    image: mycel_vera_billing_mcp
    tag: latest
    targetPort: 3001
    subdomain: mcp
    probeType: tcp
    clusterEnv: true
    serviceUrl: true
    labels:
      egress-tier: external
    env:
      ACCEPT_LICENSE: "yes"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "3001"
      MCP_TRANSPORT: "streamable-http"
    extraEnv:
      - name: ROOT_MODULE_NAME
        value: mycel_vera_billing
      - name: MCP_REGISTRY_PATH
        value: /tmp/mcp_registry.json

  mobile:
    image: mycel_vera_billing_mobile
    tag: latest
    targetPort: 3003
    subdomain: mobile
    probe: /
    env:
      ACCEPT_LICENSE: "yes"

ingress:
  slug: mycel-vera-billing
  domain: mycel.test
  className: traefik
  tls: false
  annotations: {}

config:
  ROOT_MODULE_NAME: mycel_vera_billing
  SUBMODULES: ""
  LOG_LEVEL: info
  OTEL_SERVICE_NAME: mycel_vera_billing-service
  MCP_URL: "http://mycel_vera_billing-mcp/mcp"

replicas: 1
